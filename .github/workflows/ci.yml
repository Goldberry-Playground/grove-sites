name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint, no warnings allowed in apps)
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Verifies output: "standalone" actually produces a server.js — without
      # this, Dockerfile copy steps would silently fail at deploy time.
      - name: Build all apps
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          ODOO_URL: "http://localhost:8069"
          GHOST_URL: "http://localhost:2368"
          GHOST_CONTENT_KEY: "build-placeholder"
        run: pnpm build

      - name: Verify Goldberry standalone output
        run: |
          if [ ! -f "apps/goldberry/.next/standalone/apps/goldberry/server.js" ]; then
            echo "::error::Standalone server.js missing — Dockerfile would fail."
            ls -la apps/goldberry/.next/standalone/apps/goldberry/ 2>&1 || true
            exit 1
          fi
          echo "Standalone server.js present."

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on high/critical CVEs. Tune the level if it's too noisy.
      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true # advisory until we triage; flip to false later

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # trufflehog needs full history to scan

      # gitleaks-action requires a paid license for org accounts; trufflehog
      # is still free and equivalent in coverage for our use case.
      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
